{% extends "base.html" %}
{% block title %}Регистрация организации{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="mb-3">Регистрация организации</h4>
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-primary">Создать организацию</button>
        </form>
        <div class="text-muted small mt-3">
          Уже есть аккаунт? <a href="/accounts/login/">Войти</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
