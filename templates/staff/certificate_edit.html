{% extends "base.html" %}
{% block title %}Edit Certificate #{{ cert.id }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-start mb-3">
  <div>
    <h4 class="mb-1">Edit Certificate #{{ cert.id }}</h4>
    <div class="text-muted small">Event: {{ cert.event.title }}</div>
  </div>
  <a class="btn btn-outline-secondary" href="{% url 'staff_event_certificates' cert.event.id %}">← Certificates</a>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary">Сохранить</button>
    </form>
  </div>
</div>
{% endblock %}
