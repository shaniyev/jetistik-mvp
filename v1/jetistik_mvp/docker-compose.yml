services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
    depends_on:
      - redis

  worker:
    build: .
    env_file: .env
    command: celery -A config worker -l info
    volumes:
      - ./media:/app/media
    depends_on:
      - redis
