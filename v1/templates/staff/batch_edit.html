{% extends "base.html" %}
{% block title %}Edit Batch #{{ batch.id }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-start mb-3">
  <div>
    <h4 class="mb-1">Edit Batch #{{ batch.id }}</h4>
    <div class="text-muted small">Event: {{ batch.event.title }}</div>
  </div>
  <a class="btn btn-outline-secondary" href="{% url 'staff_batch_mapping' batch.id %}">← Mapping</a>
</div>

<div class="card shadow-sm">
  <div class="card-body">
    <h5 class="card-title">Заменить файл импорта</h5>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary">Сохранить</button>
    </form>
  </div>
</div>
{% endblock %}
