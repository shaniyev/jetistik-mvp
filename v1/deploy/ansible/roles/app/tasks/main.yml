---
- name: Create app directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0755"

- name: Sync project files to server
  synchronize:
    src: "{{ playbook_dir }}/../../"
    dest: "{{ app_dir }}/"
    delete: true
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=.env"
      - "--exclude=.env.prod"
      - "--exclude=db.sqlite3"
      - "--exclude=media/"
      - "--exclude=staticfiles/"
      - "--exclude=__pycache__"
      - "--exclude=*.pyc"
      - "--exclude=node_modules"
      - "--exclude=deploy/terraform/.terraform"
      - "--exclude=deploy/terraform/terraform.tfstate*"
      - "--exclude=deploy/terraform/terraform.tfvars"
      - "--exclude=.venv"
      - "--exclude=venv"

- name: Copy .env.prod to server
  template:
    src: env.prod.j2
    dest: "{{ app_dir }}/.env.prod"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0600"

- name: Set ownership of app directory
  file:
    path: "{{ app_dir }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: true

- name: Make start-web.sh executable
  file:
    path: "{{ app_dir }}/scripts/start-web.sh"
    mode: "0755"

- name: Build app images (web + worker only)
  shell: |
    cd {{ app_dir }}
    docker compose -f docker-compose.prod.yml build web worker

- name: Restart app containers (preserve db and redis data)
  shell: |
    cd {{ app_dir }}
    docker compose -f docker-compose.prod.yml up -d --no-deps web worker
  environment:
    POSTGRES_DB: "{{ postgres_db }}"
    POSTGRES_USER: "{{ postgres_user }}"
    POSTGRES_PASSWORD: "{{ postgres_password }}"

- name: Ensure db and redis are running
  shell: |
    cd {{ app_dir }}
    docker compose -f docker-compose.prod.yml up -d db redis
  environment:
    POSTGRES_DB: "{{ postgres_db }}"
    POSTGRES_USER: "{{ postgres_user }}"
    POSTGRES_PASSWORD: "{{ postgres_password }}"

- name: Wait for web container to be healthy
  shell: |
    cd {{ app_dir }}
    docker compose -f docker-compose.prod.yml ps web --format '{{ '{{' }}.Status{{ '}}' }}' | grep -q "Up"
  register: compose_ps
  retries: 10
  delay: 5
  until: compose_ps.rc == 0
